version: "3.9"

services:
  engine:
    build: .
    command: ["python", "-m", "src.main", "--mode", "daily", "--project-root", "/app"]
    volumes:
      - ./:/app

  dashboard:
    build: .
    command: ["streamlit", "run", "app/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

  api:
    build: .
    command: ["uvicorn", "app_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
